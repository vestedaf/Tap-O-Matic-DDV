name: Build DubMachine Firmware

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout firmware repo
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make git gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Fetch Daisy dependencies
        run: |
          mkdir -p ../DaisyExamples
          git clone --depth 1 --recurse-submodules https://github.com/electro-smith/libDaisy.git ../DaisyExamples/libDaisy
          git clone --depth 1 --recurse-submodules https://github.com/electro-smith/DaisySP.git ../DaisyExamples/DaisySP

      - name: Build libDaisy
        run: make -C ../DaisyExamples/libDaisy

      - name: Build DaisySP
        run: make -C ../DaisyExamples/DaisySP

      - name: Build firmware
        run: |
          make clean
          make

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/DubMachine
          for ext in bin elf map; do
            src=$(ls build/*.$ext 2>/dev/null | head -n 1 || true)
            if [ -n "$src" ]; then
              cp -v "$src" "artifacts/DubMachine/DubMachine.$ext"
            fi
          done

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v5
        with:
          name: DubMachine
          path: |
            artifacts/DubMachine/DubMachine.bin
            artifacts/DubMachine/DubMachine.elf
            artifacts/DubMachine/DubMachine.map
