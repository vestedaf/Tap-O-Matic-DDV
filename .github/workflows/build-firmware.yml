name: Build Daisy Firmware

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout firmware repo
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make git gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Fetch Daisy dependencies
        run: |
          mkdir -p ../DaisyExamples
          git clone --depth 1 --recurse-submodules https://github.com/electro-smith/libDaisy.git ../DaisyExamples/libDaisy
          git clone --depth 1 --recurse-submodules https://github.com/electro-smith/DaisySP.git ../DaisyExamples/DaisySP

      - name: Build libDaisy
        run: make -C ../DaisyExamples/libDaisy

      - name: Build DaisySP
        run: make -C ../DaisyExamples/DaisySP

      - name: Build Tap-O-Matic firmware
        shell: bash
        run: |
          set -o pipefail
          make clean 2>&1 | tee build.log
          make 2>&1 | tee -a build.log

      - name: Publish failure summary
        if: failure()
        shell: bash
        run: |
          error_line="$(grep -m 1 -E 'fatal error:|error:|undefined reference|collect2:|ld returned' build.log || true)"
          if [ -z "$error_line" ]; then
            error_line="$(tail -n 1 build.log)"
          fi
          echo "::error title=Firmware build failure::$error_line"
          {
            echo '## Firmware build failure'
            echo
            echo '```text'
            tail -n 200 build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: tap-o-matic-firmware
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build.log
